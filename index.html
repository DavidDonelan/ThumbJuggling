<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Thumb Juggling</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  #app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
  }
  #canvas {
    display: block;
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    touch-action: none;
  }
  #counter {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    right: 18px;
    color: #eee;
    font-size: 28px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
    user-select: none;
    text-align: right;
  }
  #counter span {
    display: block;
    font-size: 10px;
    font-weight: 400;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #shapeToggle {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    left: 18px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid #444;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #eee;
    font-size: 18px;
    z-index: 5;
    touch-action: manipulation;
  }
  #imageUploadBtn {
    position: fixed;
    top: calc(14px + env(safe-area-inset-top));
    left: 66px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid #444;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #eee;
    font-size: 18px;
    z-index: 5;
    touch-action: manipulation;
  }
  #cropModal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 20px;
  }
  #cropModal.open { display: flex; }
  #cropCanvas {
    touch-action: none;
    border-radius: 8px;
    background: #111;
  }
  #cropControls {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  #cropControls .control-row { display: flex; align-items: center; gap: 12px; }
  #cropButtons {
    width: 100%;
    max-width: 320px;
    display: flex;
    gap: 12px;
  }
  #cropButtons button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: rgba(255,255,255,0.08);
    color: #eee;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #cropConfirm { background: #169b62; border-color: #169b62; }
  #sheetHandle {
    flex: 0 0 auto;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    touch-action: none;
  }
  #sheetHandle::before {
    content: '';
    width: 40px;
    height: 4px;
    border-radius: 2px;
    background: #555;
  }
  #controls {
    flex: 0 0 auto;
    overflow: hidden;
    max-height: 260px;
    padding: 0 20px;
    background: #000;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: max-height 0.28s ease, padding 0.28s ease;
    touch-action: pan-y;
  }
  #controls.hidden {
    max-height: 0;
  }
  #controls .control-row:first-child {
    margin-top: 12px;
  }
  #controls .control-row:last-child {
    margin-bottom: calc(12px + env(safe-area-inset-bottom));
  }
  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: #444;
    outline: none;
    border-radius: 2px;
    touch-action: manipulation;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #eee;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #eee;
    border: none;
    cursor: pointer;
  }
  label {
    width: 130px;
    flex: 0 0 auto;
    color: #888;
    font-size: 12px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="app">
<canvas id="canvas"></canvas>

<button id="shapeToggle" aria-label="Toggle balls or knives">🔪</button>
<button id="imageUploadBtn" aria-label="Upload image for balls">🖼️</button>
<input type="file" id="imageInput" accept="image/*" style="display:none">

<div id="cropModal">
  <canvas id="cropCanvas" width="300" height="300"></canvas>
  <div id="cropControls">
    <div class="control-row">
      <label for="zoomSlider">Zoom</label>
      <input type="range" id="zoomSlider" min="100" max="300" value="100">
    </div>
  </div>
  <div id="cropButtons">
    <button id="cropCancel">Cancel</button>
    <button id="cropConfirm">Use image</button>
  </div>
</div>

<div id="counter">0<span>catches</span></div>

<div id="controls">
  <div class="control-row">
    <label for="ballCountSlider">Balls</label>
    <input type="range" id="ballCountSlider" min="1" max="7" value="3" step="1">
  </div>
  <div class="control-row">
    <label for="gravitySlider">Gravity</label>
    <input type="range" id="gravitySlider" min="0" max="100" value="35">
  </div>
  <div class="control-row">
    <label for="viscositySlider">Air Viscosity</label>
    <input type="range" id="viscositySlider" min="0" max="100" value="0">
  </div>
  <div class="control-row">
    <label for="sizeSlider">Ball size</label>
    <input type="range" id="sizeSlider" min="18" max="60" value="36">
  </div>
  <div class="control-row">
    <label for="imageOverlapSlider">Image size</label>
    <input type="range" id="imageOverlapSlider" min="100" max="160" value="118">
  </div>
</div>

<div id="sheetHandle"></div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const ballCountSlider = document.getElementById('ballCountSlider');
  const gravitySlider = document.getElementById('gravitySlider');
  const viscositySlider = document.getElementById('viscositySlider');
  const sizeSlider = document.getElementById('sizeSlider');
  const imageOverlapSlider = document.getElementById('imageOverlapSlider');
  const controls = document.getElementById('controls');
  const sheetHandle = document.getElementById('sheetHandle');
  const counterEl = document.getElementById('counter');
  const shapeToggle = document.getElementById('shapeToggle');
  const imageUploadBtn = document.getElementById('imageUploadBtn');
  const imageInput = document.getElementById('imageInput');
  const cropModal = document.getElementById('cropModal');
  const cropCanvas = document.getElementById('cropCanvas');
  const cropCtx = cropCanvas.getContext('2d');
  const zoomSlider = document.getElementById('zoomSlider');
  const cropCancel = document.getElementById('cropCancel');
  const cropConfirm = document.getElementById('cropConfirm');

  // bottom sheet drag/toggle
  let sheetHidden = false;
  let sheetDragStartY = null;
  let sheetDragging = false;

  function setSheetHidden(hidden) {
    sheetHidden = hidden;
    controls.classList.toggle('hidden', hidden);
  }

  sheetHandle.addEventListener('pointerdown', (e) => {
    sheetDragStartY = e.clientY;
    sheetDragging = true;
    sheetHandle.setPointerCapture(e.pointerId);
  });
  sheetHandle.addEventListener('pointermove', (e) => {
    if (!sheetDragging) return;
    const dy = e.clientY - sheetDragStartY;
    if (dy > 24) setSheetHidden(true);
    if (dy < -24) setSheetHidden(false);
  });
  sheetHandle.addEventListener('pointerup', () => { sheetDragging = false; });
  sheetHandle.addEventListener('pointercancel', () => { sheetDragging = false; });
  sheetHandle.addEventListener('click', () => setSheetHidden(!sheetHidden));

  // shape mode: 'ball', 'knife', or 'image'
  let shapeMode = 'ball';
  let uploadedImage = null;

  shapeToggle.addEventListener('click', () => {
    shapeMode = shapeMode === 'ball' ? 'knife' : 'ball';
    shapeToggle.textContent = shapeMode === 'ball' ? '🔪' : '🔴';
  });

  imageUploadBtn.addEventListener('click', () => imageInput.click());

  const CROP_SIZE = 300;
  let cropImg = null;
  let cropScale = 1;      // 1 = image just covers the crop square
  let cropOffsetX = 0;
  let cropOffsetY = 0;

  // static dark mask with a circular window, built once and reused every frame
  const maskCanvas = document.createElement('canvas');
  maskCanvas.width = CROP_SIZE;
  maskCanvas.height = CROP_SIZE;
  (function buildMask() {
    const m = maskCanvas.getContext('2d');
    m.fillStyle = 'rgba(0,0,0,0.55)';
    m.fillRect(0, 0, CROP_SIZE, CROP_SIZE);
    m.globalCompositeOperation = 'destination-out';
    m.beginPath();
    m.arc(CROP_SIZE / 2, CROP_SIZE / 2, CROP_SIZE / 2 - 10, 0, Math.PI * 2);
    m.fill();
  })();

  function cropTransform() {
    const baseScale = Math.max(CROP_SIZE / cropImg.width, CROP_SIZE / cropImg.height) * cropScale;
    const dw = cropImg.width * baseScale;
    const dh = cropImg.height * baseScale;
    const dx = CROP_SIZE / 2 - dw / 2 + cropOffsetX;
    const dy = CROP_SIZE / 2 - dh / 2 + cropOffsetY;
    return { dw, dh, dx, dy };
  }

  function drawCropPreview() {
    cropCtx.clearRect(0, 0, CROP_SIZE, CROP_SIZE);
    const { dw, dh, dx, dy } = cropTransform();
    cropCtx.drawImage(cropImg, dx, dy, dw, dh);
    cropCtx.drawImage(maskCanvas, 0, 0);
    cropCtx.beginPath();
    cropCtx.arc(CROP_SIZE / 2, CROP_SIZE / 2, CROP_SIZE / 2 - 10, 0, Math.PI * 2);
    cropCtx.strokeStyle = '#eee';
    cropCtx.lineWidth = 2;
    cropCtx.stroke();
  }

  imageInput.addEventListener('change', () => {
    const file = imageInput.files && imageInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        cropImg = img;
        cropScale = 1;
        cropOffsetX = 0;
        cropOffsetY = 0;
        zoomSlider.value = 100;
        drawCropPreview();
        cropModal.classList.add('open');
      };
      img.src = reader.result; // data URL, preserves PNG alpha channel
    };
    reader.readAsDataURL(file);
  });

  zoomSlider.addEventListener('input', () => {
    cropScale = parseFloat(zoomSlider.value) / 100;
    drawCropPreview();
  });

  let cropDragging = false;
  let cropLastX = 0, cropLastY = 0;
  cropCanvas.addEventListener('pointerdown', (e) => {
    cropDragging = true;
    cropLastX = e.clientX;
    cropLastY = e.clientY;
    cropCanvas.setPointerCapture(e.pointerId);
  });
  cropCanvas.addEventListener('pointermove', (e) => {
    if (!cropDragging) return;
    cropOffsetX += e.clientX - cropLastX;
    cropOffsetY += e.clientY - cropLastY;
    cropLastX = e.clientX;
    cropLastY = e.clientY;
    drawCropPreview();
  });
  cropCanvas.addEventListener('pointerup', () => { cropDragging = false; });
  cropCanvas.addEventListener('pointercancel', () => { cropDragging = false; });

  cropCancel.addEventListener('click', () => {
    cropModal.classList.remove('open');
  });

  cropConfirm.addEventListener('click', () => {
    const baked = document.createElement('canvas');
    baked.width = CROP_SIZE;
    baked.height = CROP_SIZE;
    const bctx = baked.getContext('2d');
    const { dw, dh, dx, dy } = cropTransform();
    bctx.drawImage(cropImg, dx, dy, dw, dh);
    uploadedImage = baked;
    shapeMode = 'image';
    cropModal.classList.remove('open');
  });

  let W, H;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    W = canvas.width = rect.width * devicePixelRatio;
    H = canvas.height = rect.height * devicePixelRatio;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();
  new ResizeObserver(resize).observe(canvas);

  // Irish flag palette, cycles for ball counts beyond 3
  const COLORS = ['#169b62', '#ffffff', '#ff883e'];

  function makeBall(index) {
    return {
      x: vw() * (0.3 + Math.random() * 0.4),
      y: vh() * (0.2 + Math.random() * 0.2),
      vx: 0,
      vy: 0,
      r: ballRadius,
      color: COLORS[index % COLORS.length],
      grabbed: false,
      pointerId: null,
      resting: false, // true once it has touched the floor while ungrabbed
      angle: 0,
      angularVelocity: 0
    };
  }
  const RESTITUTION = 0.72;
  const FRICTION = 0.995;
  const ANGULAR_FRICTION = 0.985; // continuous spin decay so tosses don't rotate forever
  const FLOOR_MARGIN = 46; // keep balls clear of the sheet handle so grabbing near the floor doesn't open it

  function vw() { return canvas.getBoundingClientRect().width; }
  function vh() { return canvas.getBoundingClientRect().height; }

  function bindSlider(el, transform, onChange) {
    const apply = () => onChange(transform(parseFloat(el.value)));
    el.addEventListener('input', apply);
    apply();
  }

  let ballRadius = parseFloat(sizeSlider.value);

  let balls = [];
  for (let i = 0; i < 3; i++) balls.push(makeBall(i));

  bindSlider(sizeSlider, v => v, v => {
    ballRadius = v;
    for (const b of balls) b.r = ballRadius;
  });

  bindSlider(ballCountSlider, v => Math.round(v), (count) => {
    while (balls.length < count) balls.push(makeBall(balls.length));
    while (balls.length > count) {
      // remove an ungrabbed ball if possible, otherwise the last one
      const idx = balls.findIndex(b => !b.grabbed);
      balls.splice(idx === -1 ? balls.length - 1 : idx, 1);
    }
  });

  let catches = 0;
  function setCatches(n) {
    catches = n;
    counterEl.firstChild.textContent = catches;
  }

  let gravity;
  bindSlider(gravitySlider, v => v / 100 * 1800, v => gravity = v); // px/s^2

  let viscosity;
  bindSlider(viscositySlider, v => v / 100 * 0.006, v => viscosity = v); // quadratic drag coeff

  // pointer tracking for velocity calculation
  const pointerHistory = new Map(); // pointerId -> [{x,y,t}]

  function getPos(e) {
    return { x: e.clientX, y: e.clientY };
  }

  function findBallAt(x, y) {
    for (let i = balls.length - 1; i >= 0; i--) {
      const b = balls[i];
      if (b.grabbed) continue;
      const dx = x - b.x, dy = y - b.y;
      if (dx * dx + dy * dy <= (b.r * 1.4) * (b.r * 1.4)) return b;
    }
    return null;
  }

  canvas.addEventListener('pointerdown', (e) => {
    const { x, y } = getPos(e);
    const ball = findBallAt(x, y);

    if (!ball) {
      if (!sheetHidden) setSheetHidden(true);
      return;
    }
    // was this a catch of an airborne, previously-tossed ball?
    const wasAirborne = !ball.resting;
    if (wasAirborne) setCatches(catches + 1);

    ball.grabbed = true;
    ball.pointerId = e.pointerId;
    ball.vx = 0;
    ball.vy = 0;
    ball.angularVelocity = 0;
    pointerHistory.set(e.pointerId, [{ x, y, t: performance.now() }]);
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    const ball = balls.find(b => b.pointerId === e.pointerId && b.grabbed);
    if (!ball) return;
    const { x, y } = getPos(e);
    ball.x = x;
    ball.y = y;

    const hist = pointerHistory.get(e.pointerId);
    hist.push({ x, y, t: performance.now() });
    while (hist.length > 6) hist.shift();
  });

  function releaseBall(pointerId) {
    const ball = balls.find(b => b.pointerId === pointerId && b.grabbed);
    if (!ball) return;
    const hist = pointerHistory.get(pointerId);
    if (hist && hist.length >= 2) {
      const first = hist[0];
      const last = hist[hist.length - 1];
      const dt = (last.t - first.t) / 1000;
      if (dt > 0) {
        ball.vx = (last.x - first.x) / dt;
        ball.vy = (last.y - first.y) / dt;
      }
    }
    ball.grabbed = false;
    ball.pointerId = null;
    ball.resting = false; // it's airborne again once tossed
    // spin proportional to toss speed, direction from horizontal throw component
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    ball.angularVelocity = (ball.vx >= 0 ? 1 : -1) * Math.min(speed / 120, 14);
    pointerHistory.delete(pointerId);
  }

  const onPointerRelease = (e) => releaseBall(e.pointerId);
  canvas.addEventListener('pointerup', onPointerRelease);
  canvas.addEventListener('pointercancel', onPointerRelease);

  let lastT = performance.now();

  // clamps a ball inside [min, max] along one axis and reflects its velocity;
  // returns 'min', 'max', or null depending which bound (if any) was hit
  function resolveBoundary(b, posKey, velKey, min, max) {
    if (b[posKey] - b.r < min) {
      b[posKey] = min + b.r;
      b[velKey] *= -RESTITUTION;
      return 'min';
    }
    if (b[posKey] + b.r > max) {
      b[posKey] = max - b.r;
      b[velKey] *= -RESTITUTION;
      return 'max';
    }
    return null;
  }

  let imageOverlap;
  bindSlider(imageOverlapSlider, v => v / 100, v => imageOverlap = v);

  function drawImageBall(b) {
    const drawR = b.r * imageOverlap;
    const size = drawR * 2;
    const img = uploadedImage;
    const scale = Math.max(size / img.width, size / img.height);
    const sw = size / scale, sh = size / scale;
    const sx = (img.width - sw) / 2, sy = (img.height - sh) / 2;

    ctx.save();
    ctx.beginPath();
    ctx.arc(b.x, b.y, drawR, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    ctx.drawImage(img, sx, sy, sw, sh, -drawR, -drawR, size, size);
    ctx.restore();
  }

  function drawKnife(b) {
    const len = b.r * 2.4;      // overall length, tip to handle end
    const bladeLen = len * 0.6;
    const bladeW = b.r * 0.55;
    const handleLen = len * 0.4;
    const handleW = b.r * 0.4;

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);

    // blade: tapered polygon, tip points toward -x (arbitrary), pivot at center
    ctx.beginPath();
    ctx.moveTo(-len * 0.5, 0);                          // tip
    ctx.lineTo(-len * 0.5 + bladeLen, -bladeW * 0.5);
    ctx.lineTo(-len * 0.5 + bladeLen, bladeW * 0.5);
    ctx.closePath();
    ctx.fillStyle = '#cfd4d8';
    ctx.fill();

    // handle: rounded rect at the base
    const hx = len * 0.5 - handleLen;
    ctx.beginPath();
    ctx.roundRect(hx, -handleW * 0.5, handleLen, handleW, handleW * 0.3);
    ctx.fillStyle = '#2b2b2b';
    ctx.fill();

    ctx.restore();
  }

  function step(now) {
    let dt = (now - lastT) / 1000;
    dt = Math.min(dt, 0.033); // clamp for stability
    lastT = now;

    const width = vw();
    const height = vh() - FLOOR_MARGIN;

    for (const b of balls) {
      if (b.grabbed) continue;

      b.vy += gravity * dt;

      // quadratic drag (air thickness)
      const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
      if (speed > 0 && viscosity > 0) {
        const dragMag = viscosity * speed * speed * dt;
        const dragScale = Math.max(0, 1 - dragMag / speed);
        b.vx *= dragScale;
        b.vy *= dragScale;
      }

      b.vx *= FRICTION;
      b.vy *= FRICTION;
      b.angularVelocity *= ANGULAR_FRICTION;

      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.angle += b.angularVelocity * dt;

      // floor / ceiling
      const vHit = resolveBoundary(b, 'y', 'vy', 0, height);
      if (vHit === 'max') {
        b.vx *= 0.9;
        b.angularVelocity *= 0.6;
        if (!b.resting) {
          // this is a drop: ball hit the floor without being caught
          setCatches(0);
        }
        b.resting = true;
      }

      // walls
      resolveBoundary(b, 'x', 'vx', 0, width);
    }

    // simple ball-ball collision
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i], b = balls[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = a.r + b.r;
        if (dist > 0 && dist < minDist) {
          const overlap = (minDist - dist) / 2;
          const nx = dx / dist, ny = dy / dist;
          if (!a.grabbed) { a.x -= nx * overlap; a.y -= ny * overlap; }
          if (!b.grabbed) { b.x += nx * overlap; b.y += ny * overlap; }
          if (!a.grabbed && !b.grabbed) {
            const tempVx = a.vx, tempVy = a.vy;
            a.vx = b.vx * RESTITUTION;
            a.vy = b.vy * RESTITUTION;
            b.vx = tempVx * RESTITUTION;
            b.vy = tempVy * RESTITUTION;
          }
        }
      }
    }

    ctx.clearRect(0, 0, width, vh());

    // floor marker, dashed line at the physics floor y
    ctx.save();
    ctx.strokeStyle = '#444';
    ctx.lineWidth = 1;
    ctx.setLineDash([6, 6]);
    ctx.beginPath();
    ctx.moveTo(0, height);
    ctx.lineTo(width, height);
    ctx.stroke();
    ctx.restore();

    for (const b of balls) {
      if (shapeMode === 'image' && uploadedImage) {
        drawImageBall(b);
      } else if (shapeMode === 'knife') {
        drawKnife(b);
      } else {
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = b.color;
        ctx.fill();
      }

      if (b.grabbed) {
        // shine: larger outer glow ring so it peeks out from under the thumb
        ctx.save();
        ctx.shadowColor = 'rgba(255,255,255,0.95)';
        ctx.shadowBlur = 30;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 1.35, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.restore();
      }
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
})();
</script>
